<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ad-hoc Dispatch — WMS</title><link rel="stylesheet" href="assets/wireframe.css">
</head>
<body data-pwa-title="Ad-hoc Dispatch" data-pwa-back="pwa-home.html">
  <div id="page-content">
    <!-- screen-local styling MUST live inside #page-content (the shell rebuilds body from it only) -->
    <style>
      .ck { display:flex; gap:14px; margin:8px 0 10px; font-size:13px; flex-wrap:wrap; }
      .ck .on  { color:#235c25; font-weight:600; }
      .ck .off { color:var(--ink-faint); }
      .ck .ovr { color:#8a6d00; font-weight:600; }
      .prov { font-size:12px; margin-top:6px; padding:6px 9px; border-radius:var(--radius); }
      .prov.fefo{ background:var(--fill); color:var(--ink-soft); }
      .prov.warn{ background:#fbf6e9; color:#7a5a07; border:1px solid #e3cf94; }
      .pk-line-h { font-weight:700; font-size:13px; margin:12px 2px 6px; display:flex; align-items:flex-start; gap:8px; }
      .pk-line-h .nm { flex:1; }
      .pk-line-h small { font-weight:400; color:var(--ink-soft); }
      .pk-line-h .ln-act { font-size:12px; color:var(--brand); white-space:nowrap; }
      .pk-line-h .ln-rm  { font-size:12px; color:var(--bad); white-space:nowrap; }
      .sum-row { display:flex; justify-content:space-between; gap:10px; padding:6px 0; border-bottom:1px solid var(--line-soft); font-size:13px; }
      .sum-row:last-child { border-bottom:none; }
      .sum-row .q { font-weight:700; white-space:nowrap; }
      .short { color:#8a6d00; font-weight:600; }
      .gov-row { display:flex; justify-content:space-between; gap:10px; font-size:13px; padding:3px 0; }
      .gov-row .k { color:var(--ink-soft); } .gov-row .v { font-weight:600; text-align:right; }
      .req { color:var(--bad); }
    </style>
    <div id="disp-flash" class="sb-msg" style="display:none"></div>
    <div id="disp"></div>
  </div>
  <script src="assets/data.js"></script>
  <script src="assets/pwa-scan.js"></script>
  <script src="assets/photos.js"></script>
  <script src="assets/notes.js"></script>
  <script src="assets/pwa-shell.js"></script>
  <script>
  (function(){
    const $ = id => document.getElementById(id);
    const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const clamp = (v,lo,hi)=>Math.max(lo,Math.min(hi,Math.floor(Number(v)||0)));
    const root = $('disp');
    const TODAY = '2026-06-15';                       // mocked "today" (matches the ERP screens)
    const site = () => PWA.ctx.siteId, client = () => PWA.ctx.clientId;
    const uomOf = pid => prodUom(pid) || '';
    // The inline order is created ONLY on the final commit; until then `work` is an in-memory plan.
    //   work[] = { product, uom, usesExpiry, serial, requested, rows:[{lpn,lot,expiry,from,take,picked,done,serials,override}] }
    const S = { view:'header', shipTo:'', ref:'', reason:'', work:[], add:null, pick:null, carrier:'', last:null };

    function flash(t){ const m=$('disp-flash'); if(m){ m.textContent=t; m.style.background=''; m.style.color=''; m.style.borderColor=''; m.style.display='block'; window.scrollTo(0,0); } }
    function ok(t){ const m=$('disp-flash'); if(m){ m.textContent=t; m.style.background='#e6f3e7'; m.style.color='#235c25'; m.style.borderColor='#6fae72'; m.style.display='block'; window.scrollTo(0,0); } }
    function flashClear(){ const m=$('disp-flash'); if(m) m.style.display='none'; }

    /* ---------- allocation (FEFO/FIFO) that never double-counts a plate across work lines ---------- */
    function allocatedElsewhere(lpnId, exceptLi){
      let s=0; S.work.forEach((w,li)=>{ if(li===exceptLi) return; w.rows.forEach(r=>{ if(r.lpn===lpnId) s+=(+r.take||0); }); }); return s;
    }
    // Free base units left on a plate after OTHER live orders' reservations AND what this dispatch already grabbed.
    function freeForWork(lpnId, exceptLi){ return Math.max(0, lpnAvail(lpnId, null) - allocatedElsewhere(lpnId, exceptLi)); }
    function availFor(product, exceptLi){
      const { list } = outboundCandidates(product, client(), site(), null);
      return list.reduce((s,l)=>s+freeForWork(l.id, exceptLi), 0);
    }
    function mkRow(lpn, lot, expiry, from, take, serial){
      const l = lpnById(lpn) || {};
      const ser = serial ? ((l.serials && l.serials.length) ? l.serials.slice(0, take).join(', ') : '') : '';
      return { lpn, lot:lot||'', expiry:expiry||'', from, take, picked:0, done:false, serials:ser, override:false };
    }
    function allocateProduct(product, qty, exceptLi){       // greedy FEFO/FIFO over the same candidates a normal pick uses
      const { usesExpiry, list } = outboundCandidates(product, client(), site(), null);
      const serial = tracksSerial(product);
      let need = qty; const rows = [];
      for (const l of list){
        if (need<=0) break;
        const take = Math.max(0, Math.min(freeForWork(l.id, exceptLi), need));
        if (take<=0) continue;
        rows.push(mkRow(l.id, l.lot, l.expiry, l.loc, take, serial));
        need -= take;
      }
      return { rows, usesExpiry, serial, allocated: rows.reduce((s,r)=>s+r.take,0) };
    }

    const linePicked = w => w.rows.reduce((s,r)=>s+(r.done?(+r.picked||0):0),0);
    const lineTake   = w => w.rows.reduce((s,r)=>s+(+r.take||0),0);
    const orderIssued = () => S.work.reduce((s,w)=>s+linePicked(w),0);
    const anyPicked = () => S.work.some(w=>w.rows.some(r=>r.done && r.picked>0));

    /* ============================================================ STEP 1 — GOVERNANCE HEADER (the gate) */
    function renderHeader(){
      const cs = consigneesFor(client());
      const reasons = reasonsFor('dispatch');
      const noCne = cs.length===0;
      root.innerHTML = `
        <div class="panel" style="margin-bottom:10px">
          <b>Ad-hoc / emergency dispatch</b>
          <div class="muted" style="margin-top:4px">No ERP order yet — e.g. a customer truck is waiting. Ship now on controlled rails; the system <b>creates the outbound order</b> on the spot and writes a real delivery note so the back office &amp; billing see it.</div>
          <div class="prov warn" style="margin-top:8px">⚠ Restricted action — <b>role-gated</b> in the build (shown to all here). Every ad-hoc dispatch is <b>flagged for back-office approval</b> after the fact. <span class="muted">Non-customer removals (samples / QA / scrap) go through Adjustments, not here.</span></div>
        </div>
        ${noCne ? `<div class="panel" style="border-color:var(--bad)"><b style="color:var(--bad)">No ship-to consignee</b>
            <div class="muted" style="margin-top:4px">${esc(PWA.clientName())} has no active delivery point. An outbound must ship to a consignee — add one in Master Data → Consignees before an ad-hoc dispatch.</div></div>`
        : `
        <label class="field"><span>Ship to (consignee) <span class="req">*</span></span>
          <select id="h-cne"><option value="">— select delivery point —</option>${cs.map(c=>`<option value="${c.id}"${c.id===S.shipTo?' selected':''}>${esc(c.name)} · ${esc(c.city)}</option>`).join('')}</select></label>
        <label class="field"><span>Customer / pickup reference <span class="req">*</span></span>
          <input id="h-ref" type="text" value="${esc(S.ref)}" placeholder="customer PO, collection note, truck ref…"></label>
        <label class="field"><span>Reason <span class="req">*</span></span>
          <select id="h-reason"><option value="">— why no ERP order? —</option>${reasons.map(r=>`<option value="${esc(r)}"${r===S.reason?' selected':''}>${esc(r)}</option>`).join('')}</select></label>
        <label class="field"><span>Operator (audit)</span>
          <input type="text" value="${esc(PWA.user)}" disabled></label>
        <div class="muted" style="font-size:12px;margin:-2px 0 10px">Stock owner: <b>${esc(PWA.clientName())}</b> · Site: <b>${esc(PWA.siteName())}</b> · ships to the consignee above (not to the client).</div>
        <div class="spacer"></div>
        <button class="btn btn-primary" id="h-start" style="width:100%">Start dispatch ›${S.work.length?` (resume — ${S.work.length} line(s))`:''}</button>`}`;
      const c=$('h-cne'); if(c) c.onchange=()=>{ S.shipTo=c.value; };
      const rf=$('h-ref'); if(rf) rf.oninput=()=>{ S.ref=rf.value; };
      const rs=$('h-reason'); if(rs) rs.onchange=()=>{ S.reason=rs.value; };
      const st=$('h-start'); if(st) st.onclick=startDispatch;
    }
    function startDispatch(){
      if (!S.shipTo) return flash('Select the ship-to consignee.');
      if (!String(S.ref).trim()) return flash('Enter the customer / pickup reference.');
      if (!S.reason) return flash('Select a reason for the ad-hoc dispatch.');
      S.ref = String(S.ref).trim();
      S.view='build'; render();
    }

    /* ============================================================ STEP 2 — BUILD (add items + pick them) */
    function renderBuild(){
      let body='';
      S.work.forEach((w,li)=>{
        const tracks = w.serial ? 'lot+exp+serial' : w.usesExpiry ? 'lot+exp' : tracksLot(w.product) ? 'lot' : 'no tracking';
        const tgt = lineTake(w), shortAvail = tgt < (w.requested||0);
        body += `<div class="pk-line-h"><span class="nm">${esc(prodName(w.product))}
            <small>· ${tgt} ${esc(w.uom)} · ${esc(tracks)}</small>
            ${shortAvail?`<br><small class="short">requested ${w.requested} — only ${tgt} available</small>`:''}</span>
            <a href="#" class="ln-act" data-eq="${li}">✎ qty</a>
            <a href="#" class="ln-rm"  data-rm="${li}">✕ remove</a></div>`;
        if (!w.rows.length){ body += `<p class="scan-hint" style="text-align:left;color:var(--bad)">No available stock — every plate is reserved, expired, frozen or blocked.</p>`; return; }
        body += w.rows.map((r,ri)=>{
          const badge = !r.done ? `<span class="badge b-toputaway">pick ${r.take}</span>`
            : r.picked>=r.take ? `<span class="badge b-available">✓ ${r.picked}</span>`
            : r.picked>0 ? `<span class="badge b-allocated">short ${r.picked}/${r.take}</span>`
            : `<span class="badge b-cancelled">skipped</span>`;
          return `<div class="task" data-pick="${li}:${ri}"><span class="meta">
            <b>${esc(locName(r.from))} · ${esc(r.lpn)}</b>
            <small>pick ${r.take} ${esc(w.uom)}${tracksLot(w.product)&&r.lot?' · lot '+esc(r.lot):''}${w.usesExpiry&&r.expiry?' · exp '+esc(r.expiry):''}${w.serial?' · serial-tracked':''}</small></span>
            ${badge}</div>`;
        }).join('');
      });
      const issued = orderIssued(), canLoad = anyPicked();
      root.innerHTML = `
        <div class="panel" style="margin-bottom:10px">
          <div class="gov-row"><span class="k">Ship to</span><span class="v">${esc(consigneeName(S.shipTo))}</span></div>
          <div class="gov-row"><span class="k">Reference</span><span class="v">${esc(S.ref)}</span></div>
          <div class="gov-row"><span class="k">Reason</span><span class="v">${esc(S.reason)}</span></div>
          <div class="gov-row"><span class="k">Operator</span><span class="v">${esc(PWA.user)}</span></div>
          <div style="text-align:right;margin-top:4px"><a href="#" id="b-edithdr" class="ln-act">✎ edit header</a></div>
        </div>
        ${PWAScan.field({ id:'sf-add', prompt:'Scan a product or LPN to dispatch', autofocus:true, placeholder:'P-1001 · LPN-00008',
          kinds:['product','lpn'], onScan:onScanAdd })}
        ${S.work.length ? `<p class="scan-hint" style="text-align:left;margin-left:2px">On this dispatch (${S.work.length} line(s)) — tap a plate to scan &amp; pick</p>${body}`
          : `<div class="success" style="margin-top:8px"><p class="muted">Scan the first item to add it. The system reserves stock by <b>FEFO/FIFO</b> for you to pick — same rails as a normal pick.</p></div>`}
        <div class="spacer"></div>
        <button class="btn btn-primary" id="b-load" style="width:100%"${canLoad?'':' disabled'}>Load &amp; dispatch ›${issued?` (${issued} picked)`:''}</button>`;
      $('b-edithdr').onclick=e=>{ e.preventDefault(); S.view='header'; render(); };
      root.querySelectorAll('[data-pick]').forEach(el=>el.onclick=()=>{ const [li,ri]=el.dataset.pick.split(':').map(Number); openPick(li,ri); });
      root.querySelectorAll('[data-rm]').forEach(el=>el.onclick=e=>{ e.preventDefault(); const li=+el.dataset.rm; const nm=prodName(S.work[li].product); S.work.splice(li,1); render(); ok(`${nm} removed from the dispatch.`); });
      root.querySelectorAll('[data-eq]').forEach(el=>el.onclick=e=>{ e.preventDefault(); openAdd('product', S.work[+el.dataset.eq].product, +el.dataset.eq); });
      $('b-load').onclick=()=>{ if(!anyPicked()) return flash('Pick at least one item first.'); S.view='load'; render(); };
      const i=root.querySelector('.sb-input'); if(i) i.focus();
    }
    function onScanAdd(code, r){
      if (r && r.type==='product'){
        if (r.entity.client && r.entity.client!==client()) return flash('That product belongs to another client.');
        const li = S.work.findIndex(w=>w.product===r.id);
        if (li>=0) return openAdd('product', r.id, li);          // already added → edit its qty
        openAdd('product', r.id, null);
      } else if (r && r.type==='lpn'){
        const l=r.entity;
        if (l.client!==client() || l.site!==site()) return flash('That LPN belongs to another client/site.');
        if (S.work.some(w=>w.rows.some(x=>x.lpn===l.id))) return flash(`${l.id} is already on this dispatch.`);
        openAdd('lpn', l.id, null);
      } else flash('Scan a product (SKU / barcode) or an LPN to add.');
    }

    /* ---------- add / edit one line ---------- */
    function openAdd(mode, id, li){
      if (mode==='product'){
        const avail = availFor(id, li);
        S.add = { mode, product:id, li, avail, qty: Math.min(avail, li!=null ? (lineTake(S.work[li])||avail) : avail) };
      } else {
        const l=lpnById(id), free=freeForWork(id, null);
        S.add = { mode, lpn:id, product:l.product, li:null, free, qty:free,
                  frozen:frozenTakeFor(l.loc), expired:isExpired(l), status:l.status, loc:l.loc };
      }
      S.view='add'; render();
    }
    function renderAdd(){
      const a=S.add;
      if (a.mode==='product'){
        const none = a.avail<=0;
        root.innerHTML = `
          <div class="panel" style="margin-bottom:10px"><b>${esc(prodName(a.product))}</b>
            <div class="muted" style="margin-top:4px">${esc(trackingSummary(a.product))} · <b>${a.avail}</b> ${esc(uomOf(a.product))} available at ${esc(PWA.siteName())}${a.li!=null?' · editing this line':''}</div></div>
          ${none ? `<p class="scan-hint" style="text-align:left;color:var(--bad)">No available stock to dispatch (all reserved, expired, frozen or blocked).</p>`
            : `<label class="field"><span>Quantity to dispatch (max ${a.avail})</span>
                <input id="a-qty" type="number" min="0" max="${a.avail}" step="1" value="${a.qty}"></label>
              <div class="muted" id="a-note" style="margin:-4px 0 10px"></div>
              <button class="btn btn-primary" id="a-ok" style="width:100%">${a.li!=null?'Update line':'Add to dispatch'}</button>`}
          <button class="btn btn-outline" id="a-cancel" style="width:100%">‹ Back</button>`;
        const qi=$('a-qty'); if(qi){ qi.oninput=()=>{ a.qty=clamp(qi.value,0,a.avail); paintAddNote(); }; }
        const okb=$('a-ok'); if(okb) okb.onclick=commitAdd;
        paintAddNote();
      } else {
        const l=lpnById(a.lpn);
        const block = a.frozen ? `${locName(a.loc)} is frozen by ${a.frozen.id} — cannot dispatch from it.`
          : a.expired ? `${a.lpn} is past expiry — cannot dispatch; route to disposal / adjustment.`
          : a.status!=='available' ? `${a.lpn} is ${a.status} — only available stock can be dispatched.`
          : a.free<=0 ? `${a.lpn} has no free stock (already reserved or on this dispatch).` : '';
        root.innerHTML = `
          <div class="panel" style="margin-bottom:10px"><b class="mono">${esc(a.lpn)}</b>
            <div class="muted" style="margin-top:4px">${esc(prodName(a.product))} · at <b>${esc(locName(a.loc))}</b>${tracksLot(a.product)&&l.lot?' · lot '+esc(l.lot):''}${tracksExpiry(a.product)&&l.expiry?' · exp '+esc(l.expiry):''}</div></div>
          ${block ? `<p class="scan-hint" style="text-align:left;color:var(--bad)">${esc(block)}</p>`
            : `<label class="field"><span>Quantity to dispatch (of ${a.free})</span>
                <input id="a-qty" type="number" min="0" max="${a.free}" step="1" value="${a.qty}"></label>
              <div class="muted" id="a-note" style="margin:-4px 0 10px"></div>
              <button class="btn btn-primary" id="a-ok" style="width:100%">Add to dispatch</button>`}
          <button class="btn btn-outline" id="a-cancel" style="width:100%">‹ Back</button>`;
        const qi=$('a-qty'); if(qi){ qi.oninput=()=>{ a.qty=clamp(qi.value,0,a.free); paintAddNote(); }; }
        const okb=$('a-ok'); if(okb) okb.onclick=commitAdd;
        paintAddNote();
      }
      $('a-cancel').onclick=()=>{ S.add=null; S.view='build'; render(); };
      const i=root.querySelector('input[type=number]'); if(i) i.focus();
    }
    function paintAddNote(){
      const n=$('a-note'); if(!n) return; const a=S.add, cap=a.mode==='product'?a.avail:a.free;
      n.innerHTML = a.qty>=cap && cap>0 ? `Dispatching all <b>${cap}</b> ${esc(uomOf(a.product))} available.`
        : a.qty>0 ? `Dispatching <b>${a.qty}</b> of ${cap} ${esc(uomOf(a.product))}.`
        : `<span class="short">Enter a quantity.</span>`;
    }
    function commitAdd(){
      const a=S.add;
      if (a.mode==='product'){
        const qty=clamp(a.qty,0,a.avail);
        if (qty<=0) return flash('Enter a quantity to dispatch.');
        const { rows, usesExpiry, serial, allocated } = allocateProduct(a.product, qty, a.li);
        if (!allocated) return flash('No available stock to allocate.');
        const w = { product:a.product, uom:uomOf(a.product), usesExpiry, serial, requested:qty, rows };
        if (a.li!=null) S.work[a.li]=w; else S.work.push(w);
      } else {
        if (a.frozen)  return flash(`${locName(a.loc)} is frozen by ${a.frozen.id} — cannot dispatch from it.`);
        if (a.expired) return flash(`${a.lpn} is past expiry — cannot dispatch.`);
        if (a.status!=='available') return flash(`${a.lpn} is ${a.status} — only available stock can be dispatched.`);
        const qty=clamp(a.qty,0,a.free);
        if (qty<=0) return flash('Enter a quantity to dispatch.');
        const l=lpnById(a.lpn), serial=tracksSerial(l.product);
        S.work.push({ product:l.product, uom:uomOf(l.product), usesExpiry:tracksExpiry(l.product), serial, requested:qty,
                      rows:[ mkRow(l.id, l.lot, l.expiry, l.loc, qty, serial) ] });
      }
      S.add=null; S.view='build'; render();
      ok('Item added — tap it to scan & pick.');
    }

    /* ============================================================ PICK one row (scan loc → scan unit → qty → serials) */
    function openPick(li,ri){
      const w=S.work[li], r=w.rows[ri];
      S.pick={ li, ri, qty:(r.done?r.picked:r.take), serials:r.serials||'', scanLoc:false, scanUnit:false, override:false };
      S.view='pick'; render();
    }
    function renderPick(){
      const w=S.work[S.pick.li], r=w.rows[S.pick.ri], pk=S.pick;
      const scanned = pk.scanLoc && pk.scanUnit, canConfirm = scanned || pk.override;   // scan is the mis-pick guard
      root.innerHTML = `
        <div class="panel" style="margin-bottom:10px">
          <b>Pick ${r.take} ${esc(w.uom)} of ${esc(prodName(w.product))}</b>
          <div class="muted" style="margin-top:4px">${tracksLot(w.product)&&r.lot?'lot '+esc(r.lot)+' · ':''}${w.usesExpiry&&r.expiry?'exp '+esc(r.expiry)+' · ':''}from <b>${esc(locName(r.from))}</b> · <span class="mono">${esc(r.lpn)}</span></div>
        </div>
        ${PWAScan.field({ id:'sf-pickrow', prompt:'Scan the bin, then the LPN', placeholder:esc(locName(r.from))+' · '+esc(r.lpn),
            kinds:['location','lpn','product'],
            list:[{value:r.from,label:locName(r.from),sub:'bin'},{value:r.lpn,label:r.lpn,sub:'LPN'}], onScan:onScanRow })}
        <div class="ck"><span class="${pk.scanLoc?'on':'off'}">📍 Location ${pk.scanLoc?'✓':'— scan'}</span>
          <span class="${pk.scanUnit?'on':'off'}">🏷 ${w.serial?'Unit':'LPN'} ${pk.scanUnit?'✓':'— scan'}</span>
          ${pk.override?'<span class="ovr">⚠ manual override</span>':''}</div>
        <label class="field"><span>Quantity picked (of ${r.take})</span>
          <input id="pk-qty" type="number" min="0" max="${r.take}" step="1" value="${pk.qty}"></label>
        <div class="muted" id="pk-note" style="margin:-4px 0 10px"></div>
        ${w.serial?`<label class="field"><span>Serials picked <span class="req">*</span></span>
          <textarea id="pk-ser" rows="2" placeholder="scan / enter serials">${esc(pk.serials)}</textarea></label>
          <div class="muted" style="margin:-4px 0 10px;font-size:12px">Record ${r.take} serial(s) — scanned off the units.</div>`:''}
        <button class="btn btn-primary" id="pk-confirm" style="width:100%"${canConfirm?'':' disabled'}>Confirm pick</button>
        ${canConfirm?'':`<button class="btn btn-outline btn-sm" id="pk-override" style="width:100%">Can’t scan? Confirm manually (override)</button>`}
        <button class="btn btn-outline" id="pk-back" style="width:100%">‹ Back to dispatch</button>`;
      const qi=$('pk-qty'); if(qi) qi.oninput=()=>{ pk.qty=clamp(qi.value,0,r.take); paintPickNote(r,w); };
      const se=$('pk-ser'); if(se) se.oninput=()=>{ pk.serials=se.value; };
      $('pk-confirm').onclick=()=>commitPick();
      const ov=$('pk-override'); if(ov) ov.onclick=()=>{ pk.override=true; render(); };
      $('pk-back').onclick=()=>{ S.pick=null; S.view='build'; render(); };
      paintPickNote(r,w);
      const i=root.querySelector('.sb-input'); if(i) i.focus();
    }
    function paintPickNote(r,w){
      const n=$('pk-note'); if(!n) return;
      n.innerHTML = S.pick.qty>=r.take ? `Picking the full plate allocation (<b>${r.take}</b> ${esc(w.uom)}).`
        : S.pick.qty>0 ? `<span class="short">Short pick — <b>${S.pick.qty}</b> of ${r.take}; only what ships is recorded.</span>`
        : `<span class="short">Skipping this plate (0 picked).</span>`;
    }
    function onScanRow(code, r){
      const w=S.work[S.pick.li], row=w.rows[S.pick.ri];
      if (r && r.type==='location'){ if(r.id===row.from){ S.pick.scanLoc=true; render(); ok('Location confirmed.'); } else flash(`Wrong bin — go to ${locName(row.from)}.`); }
      else if (r && r.type==='lpn'){ if(r.id===row.lpn){ S.pick.scanUnit=true; render(); ok('LPN confirmed.'); } else flash(`Wrong LPN — expected ${row.lpn}.`); }
      else if (r && r.type==='product'){ if(r.id===w.product){ S.pick.scanUnit=true; render(); ok('Product confirmed.'); } else flash('That product is not on this pick.'); }
      else flash('Scan the bin (LOC-…) or the LPN / product.');
    }
    function commitPick(){
      const w=S.work[S.pick.li], r=w.rows[S.pick.ri];
      if (!(S.pick.scanLoc && S.pick.scanUnit) && !S.pick.override) return flash('Scan the bin and the LPN to confirm (or use the manual override).');
      const qty=clamp(S.pick.qty,0,r.take);
      if (w.serial && qty>0 && !String(S.pick.serials||'').trim()) return flash('Record the serial(s) for this serial-tracked pick.');
      r.picked=qty; r.serials=w.serial?String(S.pick.serials||'').trim():''; r.done=true; r.override=!!S.pick.override && !(S.pick.scanLoc&&S.pick.scanUnit);
      S.pick=null; S.view='build'; render();
      ok(qty>=r.take ? `Picked ${qty} ${w.uom} of ${prodName(w.product)} from ${locName(r.from)}.`
        : qty>0 ? `Short pick recorded — ${qty} of ${r.take} ${w.uom} of ${prodName(w.product)}.`
        : `${prodName(w.product)} from ${locName(r.from)} skipped (0 picked).`);
    }

    /* ============================================================ LOAD & DISPATCH (carrier + proof-of-load → create order + issue) */
    function renderLoad(){
      let lines='';
      S.work.forEach(w=>{ const got=linePicked(w); if(!got) return;
        lines += `<div class="sum-row"><span>${esc(prodName(w.product))}</span><span class="q">${got} ${esc(w.uom)}</span></div>`; });
      const issued=orderIssued();
      root.innerHTML = `
        <div class="panel" style="margin-bottom:10px"><b>Ad-hoc dispatch</b> → <b>${esc(consigneeName(S.shipTo))}</b>
          <div class="gov-row" style="margin-top:6px"><span class="k">Reference</span><span class="v">${esc(S.ref)}</span></div>
          <div class="gov-row"><span class="k">Reason</span><span class="v">${esc(S.reason)}</span></div>
          <div class="muted" style="margin-top:4px">Confirm creates the outbound order, issues the stock, writes the delivery note, and flags it for back-office approval.</div></div>
        <div class="panel" style="margin-bottom:10px">${lines || '<span class="muted">Nothing picked.</span>'}
          <div class="sum-row" style="border-top:2px solid var(--line);margin-top:4px;padding-top:8px"><span><b>Total to issue</b></span><span class="q">${issued} unit(s)</span></div></div>
        <label class="field"><span>Carrier <span class="req">*</span></span>
          <select id="ld-carrier"><option value="">— select carrier —</option>${DB.carriers.map(c=>`<option value="${c.id}"${c.id===S.carrier?' selected':''}>${esc(c.name)}</option>`).join('')}</select></label>
        <div style="margin:6px 0">${photoField({ ref:'adhoc-dispatch', level:'header', title:'Proof of load (optional)' })}</div>
        <div style="margin:6px 0">${noteField({ ref:'adhoc-dispatch', level:'header', title:'Dispatch note (optional)' })}</div>
        <div class="spacer"></div>
        <button class="btn btn-primary" id="ld-confirm" style="width:100%">Confirm dispatch &amp; issue</button>
        <button class="btn btn-outline" id="ld-back" style="width:100%">‹ Back to dispatch</button>`;
      const cs=$('ld-carrier'); if(cs) cs.onchange=()=>{ S.carrier=cs.value; };
      $('ld-confirm').onclick=issueDispatch;
      $('ld-back').onclick=()=>{ S.view='build'; render(); };
    }
    function issueDispatch(){
      if (!anyPicked()) return flash('Pick at least one item before dispatching.');
      // F15 — serial validation on issue: non-empty, count === picked qty, no duplicates (was presence-only).
      for (const w of S.work){
        if (!w.serial) continue;
        for (const r of w.rows){
          if (!(r.done && r.picked>0)) continue;
          const vs = validateSerials(r.serials, r.picked);
          if (!vs.ok) return flash(`Serials invalid — ${prodName(w.product)} (${r.lpn}): ${vs.error}.`);
        }
      }
      if (!S.carrier) return flash('Select a carrier for the dispatch.');

      // Originate the outbound order on the floor — flagged ad-hoc + pending back-office approval.
      const o = { id:nextOutId(), client:client(), site:site(), shipTo:S.shipTo, ref:S.ref, created:TODAY,
                  status:'open', fullStockOut:false, adhoc:true, approval:'pending', reason:S.reason, by:PWA.user,
                  shipments:[], lines:[] };
      const shipId = `${o.id.replace('OUT-','DN-')}-1`;
      const shipLines=[]; let issued=0;
      S.work.forEach(w=>{
        const picks = w.rows.filter(r=>r.done && r.picked>0);
        if (!picks.length) return;
        let lp=0;
        const allocCopy = picks.map(r=>{
          const q=+r.picked||0; issued+=q; lp+=q;
          const l=lpnById(r.lpn); if(l){ l.qty=Math.max(0,l.qty-q); if(l.qty<=0) l.status='dispatched'; }   // issue the stock
          logTxn({ type:'dispatch', lpn:r.lpn, product:w.product, qty:q, from:r.from, to:'', site:o.site,
                   user:PWA.user, ref:o.id, note:`Ad-hoc dispatch · ${shipId} · ${o.reason}` });
          return { lpn:r.lpn, lot:r.lot, expiry:r.expiry, from:r.from, qty:q, picked:q, serials:w.serial?r.serials:undefined };
        });
        // ad-hoc documents exactly what shipped → ordered qty == shipped (order is complete by construction)
        o.lines.push({ product:w.product, qty:lp, shipped:lp, alloc:[] });
        shipLines.push({ product:w.product, picked:lp, alloc:allocCopy });
      });
      if (!shipLines.length) return flash('Pick at least one item before dispatching.');
      o.shipments.push({ id:shipId, date:TODAY, carrier:S.carrier, adhoc:true, lines:shipLines });
      o.status='dispatched'; o.dispatched=TODAY;
      DB.outbound.push(o);
      PWA.save();
      S.last={ orderId:o.id, shipId, issued, ref:o.ref, reason:o.reason,
               carrier:(DB.carriers.find(c=>c.id===S.carrier)||{}).name||S.carrier,
               consignee:consigneeName(o.shipTo), lines:shipLines.slice() };
      S.view='done'; render();
    }

    /* ============================================================ DONE — delivery note + approval flag */
    function renderDone(){
      const L=S.last||{};
      const lines = (L.lines||[]).map(sl=>`<div class="sum-row"><span>${esc(prodName(sl.product))}</span><span class="q">${sl.picked} ${esc(uomOf(sl.product))}</span></div>`).join('');
      root.innerHTML = `
        <div class="success"><div class="check">✓</div>
          <p><b>${L.issued} unit(s) issued</b> · dispatched to ${esc(L.consignee||'—')}.</p></div>
        <div class="panel" style="margin:10px 0">
          <b>Delivery note <span class="mono">${esc(L.shipId||'')}</span></b> <span class="badge b-allocated">ad-hoc</span>
          <div class="muted" style="margin:4px 0 8px">Order <span class="mono">${esc(L.orderId||'')}</span> created · Ref ${esc(L.ref||'—')} · Carrier ${esc(L.carrier||'—')} · ${esc(TODAY)}</div>
          ${lines}
          <div class="sum-row" style="border-top:2px solid var(--line);margin-top:4px;padding-top:8px"><span><b>Total issued</b></span><span class="q">${L.issued}</span></div></div>
        <div class="prov warn" style="margin:0 0 10px">⏳ <b>Flagged for back-office approval</b> — reason: ${esc(L.reason||'—')}. The back office reconciles this ad-hoc dispatch (the inverse of matching a blind receipt to its PO).</div>
        <button class="btn btn-primary" id="dn-more" style="width:100%">New ad-hoc dispatch</button>
        <button class="btn btn-outline" id="dn-pick" style="width:100%">View in Pick / Dispatch</button>
        <button class="btn btn-outline" id="dn-home" style="width:100%">Home</button>`;
      $('dn-more').onclick=()=>{ S.shipTo=''; S.ref=''; S.reason=''; S.work=[]; S.add=null; S.pick=null; S.carrier=''; S.last=null; S.view='header'; render(); };
      $('dn-pick').onclick=()=>{ location.href='pwa-so-pick.html'; };
      $('dn-home').onclick=()=>{ location.href='pwa-home.html'; };
    }

    /* ============================================================ dispatch */
    function render(){
      flashClear();
      ({ header:renderHeader, build:renderBuild, add:renderAdd, pick:renderPick, load:renderLoad, done:renderDone }[S.view] || renderHeader)();
    }
    render();
  })();
  </script>
</body>
</html>
